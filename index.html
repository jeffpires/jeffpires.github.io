<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Practical geospatial solutions for informed action. GIS, data visualization and humanitarian mapping.">
<meta property="og:title" content="Gaia Analytica">
<meta property="og:description" content="Practical geospatial solutions for informed action.">
<meta property="og:url" content="https://gaiaanalytica.ch">
<meta property="og:type" content="website">
<meta property="og:image" content="https://gaiaanalytica.ch/og-image.jpg">
<title>Gaia Analytica</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #090f0b; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

.vignette {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  background: radial-gradient(ellipse at center,
    transparent 30%,
    rgba(9,15,11,0.5) 65%,
    rgba(9,15,11,0.85) 100%);
}

.overlay {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}

.site-name {
  font-family: 'Cinzel', serif;
  font-weight: 300;
  font-size: clamp(2.2rem, 5.5vw, 5rem);
  letter-spacing: 0.25em;
  color: rgba(225, 215, 190, 0.95);
  text-shadow: 0 2px 40px rgba(90, 130, 70, 0.4);
  text-transform: uppercase;
  text-align: center;
}

.rule {
  display: flex; align-items: center; gap: 1.2rem;
  margin: 1.8rem 0;
}
.rule-line {
  width: 60px; height: 1px;
  background: linear-gradient(to right, transparent, rgba(130,165,90,0.55));
}
.rule-line.r { transform: scaleX(-1); }
.rule-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(130, 165, 90, 0.7);
  transition: transform 0.6s ease-out, opacity 0.6s ease-out, box-shadow 0.3s ease-out;
}

.tagline {
  font-family: 'Raleway', sans-serif;
  font-weight: 300;
  font-size: clamp(0.85rem, 1.6vw, 1.2rem);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(210, 200, 170, 0.85);
  text-align: center;
  text-shadow: 0 0 80px rgba(180, 160, 100, 0.15);
  /* max-width: 38ch;  
  margin-inline: auto;
  line-height: 1.9; */
}

.coming-soon {
  font-family: 'Raleway', sans-serif;
  font-weight: 200;
  font-size: clamp(0.5rem, 0.8vw, 0.65rem);
  letter-spacing: 0.75em;
  text-transform: uppercase;
  color: rgba(95, 125, 70, 0.65);
  margin-top: 3.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid rgba(100, 140, 75, 0.2);
}

/* Subtle fade-in on load */
.overlay { animation: fadeIn 2.5s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }

.page-links {
  display: flex; align-items: center; gap: 1.2rem;
  margin-top: 3rem;
  font-family: 'Raleway', sans-serif;
  font-weight: 200;
  font-size: clamp(0.6rem, 0.95vw, 0.75rem);
  letter-spacing: 0.38em;
  text-transform: uppercase;
  pointer-events: all;
}
.page-link {
  color: rgba(180, 210, 120, 0.72);
  text-decoration: none;
  transition: color 0.35s;
}
.page-link:hover { color: rgba(225, 215, 190, 0.95); }
.page-link-sep { color: rgba(130, 165, 90, 0.35); }

/* Lab beaker widget */
.lab-widget {
  position: fixed; left: 1.8rem; bottom: 1.8rem; z-index: 15;
  display: flex; flex-direction: column; align-items: flex-start;
  justify-content: flex-end; gap: 0.6rem;
}

.lab-links {
  display: flex; flex-direction: column; align-items: flex-start; gap: 0.5rem;
}
.lab-link {
  font-family: 'Raleway', sans-serif;
  font-weight: 200;
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(180, 210, 120, 0.85);
  text-decoration: none;
  background: rgba(9, 15, 11, 0.6);
  border: 1px solid rgba(100, 140, 75, 0.3);
  border-radius: 3px;
  padding: 0.4rem 0.75rem;
  opacity: 0; transform: translateY(6px);
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease, color 0.3s ease, border-color 0.3s ease;
}
.lab-link:hover { color: rgba(225, 215, 190, 0.95); border-color: rgba(130, 165, 90, 0.5); }
.lab-widget.open .lab-link {
  opacity: 1; transform: translateY(0); pointer-events: auto;
}
.lab-link:nth-child(2) { transition-delay: 0.05s; }

.lab-beaker {
  background: none; border: none; padding: 0.3rem;
  cursor: pointer; line-height: 0;
}
.lab-beaker svg { width: 30px; height: 36px; display: block; }
.lab-beaker:hover svg, .lab-widget.open .lab-beaker svg {
  animation: labShake 0.5s ease-in-out infinite;
}

@keyframes labShake {
  0%, 100% { transform: rotate(0deg) translateX(0); }
  20% { transform: rotate(-3deg) translateX(-1px); }
  40% { transform: rotate(2deg) translateX(1px); }
  60% { transform: rotate(-2deg) translateX(-1px); }
  80% { transform: rotate(3deg) translateX(1px); }
}

.lab-bubble {
  transform-box: fill-box; transform-origin: center;
  animation: labBubble 3.6s ease-in infinite;
}
.lab-bubble.b1 { animation-delay: 0s; }
.lab-bubble.b2 { animation-delay: 1s; }
.lab-bubble.b3 { animation-delay: 2s; }
.lab-beaker:hover .lab-bubble, .lab-widget.open .lab-bubble {
  animation-duration: 1s;
}

@keyframes labBubble {
  0% { transform: translateY(0); opacity: 0; }
  15% { opacity: 0.85; }
  85% { opacity: 0.5; }
  100% { transform: translateY(-16px); opacity: 0; }
}

@media (max-width: 480px) {
  .lab-widget { left: 1.1rem; bottom: 1.1rem; }
  .lab-beaker svg { width: 26px; height: 31px; }
}
</style>
</head>
<body>

<canvas id="terrain"></canvas>
<div class="vignette"></div>

<div class="overlay">
  <!-- ✏️ -->
  <div class="site-name">Gaia Analytica</div>

  <div class="rule">
    <div class="rule-line"></div>
    <div class="rule-dot"></div>
    <div class="rule-line r"></div>
  </div>

  <!-- ✏️ -->
  <div class="tagline">Practical Geospatial Solutions<br>for Informed Action</div>

  <!--
  <div class="coming-soon">Coming Soon</div>
  -->

  <div class="page-links">
    <a href="cv.html" class="page-link">CV</a>
    <span class="page-link-sep">·</span>
    <a href="mailto:jeff@gaiaanalytica.ch" class="page-link">jeff@gaiaanalytica.ch</a>
  </div>
</div>

<div class="lab-widget" id="labWidget">
  <div class="lab-links" id="labLinks">
    <a href="https://gaiaanalytica.ch/GuessWhere" class="lab-link">Guess Where?</a>
    <a href="https://gaiaanalytica.ch/geotrace" class="lab-link">GeoTrace</a>
  </div>
  <button class="lab-beaker" id="labBeaker" aria-label="Open lab projects" aria-expanded="false">
    <svg viewBox="0 0 40 50" fill="none">
      <defs>
        <clipPath id="flaskClip">
          <path d="M16 4 L16 14 L6 40 Q6 46 12 46 L28 46 Q34 46 34 40 L24 14 L24 4 Z"/>
        </clipPath>
      </defs>
      <rect x="6" y="27" width="28" height="19" fill="rgba(180,210,120,0.4)" clip-path="url(#flaskClip)"/>
      <circle class="lab-bubble b1" cx="15" cy="40" r="1.4" fill="rgba(225,215,190,0.8)" clip-path="url(#flaskClip)"/>
      <circle class="lab-bubble b2" cx="20" cy="38" r="1.1" fill="rgba(225,215,190,0.8)" clip-path="url(#flaskClip)"/>
      <circle class="lab-bubble b3" cx="25" cy="41" r="1.6" fill="rgba(225,215,190,0.8)" clip-path="url(#flaskClip)"/>
      <path d="M16 4 L16 14 L6 40 Q6 46 12 46 L28 46 Q34 46 34 40 L24 14 L24 4 Z"
        stroke="rgba(130,165,90,0.75)" stroke-width="1.3" stroke-linejoin="round"/>
      <line x1="14" y1="4" x2="26" y2="4" stroke="rgba(130,165,90,0.75)" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<script>
const canvas = document.getElementById('terrain');
const ctx = canvas.getContext('2d');
let W, H, t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Lightweight terrain field (sum of sines as cheap noise)
function field(x, y, t) {
  const s = 0.003;
  return (
    Math.sin(x * s * 1.1 + t * 0.17 + Math.cos(y * s * 0.9 - t * 0.05)) * 1.2 +
    Math.sin(y * s * 1.25 - t * 0.12 + Math.cos(x * s * 1.1 + t * 0.07)) * 0.9 +
    Math.sin((x - y) * s * 0.8 + t * 0.085) * 0.6
  );
}

// Earthy contour palette: deep forest → sage → ochre ridge
const contours = [
  { v: -1.8, rgba: [22, 44, 25, 0.82] },
  { v: -0.8, rgba: [38, 65, 42, 0.72] },
  { v:  0.1, rgba: [58, 88, 52, 0.65] },
  { v:  0.7, rgba: [82, 108, 62, 0.58] },
  { v:  1.2, rgba: [112, 132, 72, 0.5]  },
  { v:  1.6, rgba: [140, 150, 85, 0.42] },
  { v:  2.0, rgba: [165, 148, 95, 0.34] },
];

function draw() {
  ctx.fillStyle = '#090f0b';
  ctx.fillRect(0, 0, W, H);

  const res = 13;
  const cols = Math.ceil(W / res) + 2;
  const rows = Math.ceil(H / res) + 2;

  // Precompute field grid
  const g = [];
  for (let j = 0; j < rows; j++) {
    g[j] = new Float32Array(cols);
    for (let i = 0; i < cols; i++) {
      g[j][i] = field(i * res, j * res, t);
    }
  }

  // Marching squares: draw contour lines at each threshold
  for (const { v: thr, rgba: [r, gv, b, a] } of contours) {
    ctx.beginPath();
    ctx.strokeStyle = `rgba(${r},${gv},${b},${a})`;
    ctx.lineWidth = 0.75;
    ctx.lineCap = 'round';

    for (let j = 0; j < rows - 1; j++) {
      for (let i = 0; i < cols - 1; i++) {
        const x0 = i * res, y0 = j * res;
        const tl = g[j][i], tr = g[j][i+1];
        const bl = g[j+1][i], br = g[j+1][i+1];

        const pts = [];

        // Top edge
        if ((tl - thr) * (tr - thr) < 0)
          pts.push([x0 + res * (thr - tl) / (tr - tl), y0]);
        // Right edge
        if ((tr - thr) * (br - thr) < 0)
          pts.push([x0 + res, y0 + res * (thr - tr) / (br - tr)]);
        // Bottom edge
        if ((bl - thr) * (br - thr) < 0)
          pts.push([x0 + res * (thr - bl) / (br - bl), y0 + res]);
        // Left edge
        if ((tl - thr) * (bl - thr) < 0)
          pts.push([x0, y0 + res * (thr - tl) / (bl - tl)]);

        if (pts.length === 2) {
          ctx.moveTo(pts[0][0], pts[0][1]);
          ctx.lineTo(pts[1][0], pts[1][1]);
        } else if (pts.length === 4) {
          // Saddle: connect in two pairs
          ctx.moveTo(pts[0][0], pts[0][1]);
          ctx.lineTo(pts[1][0], pts[1][1]);
          ctx.moveTo(pts[2][0], pts[2][1]);
          ctx.lineTo(pts[3][0], pts[3][1]);
        }
      }
    }
    ctx.stroke();
  }
}

let lastFrame = 0;
function animate(ts) {
  requestAnimationFrame(animate);
  if (document.hidden) return;
  if (ts - lastFrame < 40) return; // ~25fps ceiling
  lastFrame = ts;
  t += 0.0084;
  draw();
}
requestAnimationFrame(animate);

  // Sticky dot movement + link hover glow
  const dot = document.querySelector('.rule-dot');
  let linkActive = false;

  document.querySelectorAll('.page-link').forEach(link => {
    link.addEventListener('mouseenter', () => {
      linkActive = true;
      dot.style.opacity = '1';
      dot.style.boxShadow = '0 0 18px 9px rgba(180, 210, 120, 0.88)';
    });
    link.addEventListener('mouseleave', () => {
      linkActive = false;
    });
  });

  document.addEventListener('mousemove', (e) => {
    if (linkActive) return;
    const pct = e.clientX / window.innerWidth;
    const offset = Math.pow(pct - 0.5, 3) * 120;
    // Keep dot visible across the full screen; dims toward edges but stays at min 0.35
    const opacity = 0.35 + 0.65 * Math.pow(Math.max(0, 1 - Math.abs(pct - 0.5) * 2), 2);
    dot.style.transform = `translateX(${offset}px)`;
    dot.style.opacity = opacity;

    // Glow when near center
    const proximity = 1 - Math.min(Math.abs(pct - 0.5) * 25, 1);
    const glowSize = proximity * 18;
    const glowOpacity = proximity * 0.9;
    dot.style.boxShadow = `0 0 ${glowSize}px ${glowSize * 0.5}px rgba(180, 210, 120, ${glowOpacity})`;
  });

  // Lab beaker toggle: click to reveal lab project links, click outside or Escape to close
  const labWidget = document.getElementById('labWidget');
  const labBeaker = document.getElementById('labBeaker');

  function closeLab() {
    labWidget.classList.remove('open');
    labBeaker.setAttribute('aria-expanded', 'false');
  }

  labBeaker.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = labWidget.classList.toggle('open');
    labBeaker.setAttribute('aria-expanded', String(isOpen));
  });

  document.addEventListener('click', (e) => {
    if (!labWidget.contains(e.target)) closeLab();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLab();
  });

</script>
</body>
</html>
