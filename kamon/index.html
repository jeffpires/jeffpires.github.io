<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kamon</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-red:    #d94040;
  --c-orange: #d97820;
  --c-yellow: #c8a800;
  --c-green:  #2e9048;
  --c-teal:   #1a8888;
  --c-blue:   #2858a8;
  --c-bg:     #2d5a4a;
  --c-panel:  #242424;
  --c-border: #3a3a3a;
  --c-text:   #e8e8e8;
  --c-muted:  #888;
  --c-p1:     #e8e8e8;
  --c-p2:     #aaaaaa;
}

html, body {
  height: 100%;
  background: var(--c-bg);
  color: var(--c-text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── Top bar ── */
#topbar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--c-panel);
  border-bottom: 1px solid var(--c-border);
  min-height: 52px;
}
#turn-label {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
#turn-label.your-turn { color: #a0e880; }
#turn-label.their-turn { color: var(--c-muted); }
#constraint-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--c-muted);
}
.constraint-swatch {
  width: 18px; height: 18px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.2);
  display: inline-block;
}
.constraint-sym {
  width: 20px; height: 20px;
}

/* ── Board ── */
#board-wrap {
  flex: 1 1 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  overflow: hidden;
}
#board {
  max-width: 100%;
  max-height: 100%;
  touch-action: manipulation;
}

/* Hex base styles */
.hex-bg {
  stroke: rgba(0,0,0,0.35);
  stroke-width: 0.04;
  cursor: default;
  transition: opacity 0.15s;
}
.hex-sym {
  pointer-events: none;
}
.hex-group {
  cursor: default;
}
.hex-group.clickable {
  cursor: pointer;
}
.hex-group.clickable .hex-bg:hover {
  opacity: 0.85;
}

/* Valid-move ring: invisible (tiles are clickable but not highlighted) */
.valid-ring {
  fill: none;
  stroke: #ffe060;
  stroke-width: 0.12;
  pointer-events: none;
  opacity: 0;
}

/* Last-claimed gold ring: same grow-shrink pulse as the old valid-move ring */
.claimed-ring {
  fill: none;
  stroke-width: 0.10;
  pointer-events: none;
  opacity: 0;
}
.hex-group.last-claimed .claimed-ring {
  opacity: 1;
  animation: pulse-claimed 1.1s ease-in-out infinite;
}
@keyframes pulse-claimed {
  0%,100% { stroke-opacity: 1; stroke-width: 0.10; }
  50%      { stroke-opacity: 0.4; stroke-width: 0.18; }
}

/* ── Win reveal bar ── */
#win-reveal {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(10,10,10,0.93);
  color: #f0f0f0;
  padding: 14px 18px;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  z-index: 50;
  border-top: 1px solid rgba(255,255,255,0.14);
  min-height: 68px;
  box-sizing: border-box;
}
#win-reveal-text { display: flex; flex-direction: column; gap: 3px; }
#win-reveal-title { font-size: 15px; font-weight: 700; }
#win-reveal-desc  { font-size: 12px; color: #bbb; line-height: 1.4; }
#win-reveal .btn  { flex-shrink: 0; padding: 9px 16px; font-size: 13px; }
#board-wrap.win-reveal-mode { padding-bottom: 68px; }
.win-reveal-mode .hex-group:not(.win-tile):not(.win-enclosed) { opacity: 0.25; }
.win-reveal-mode .hex-group.win-tile .valid-ring {
  opacity: 1;
  stroke: #ffd700;
  stroke-width: 0.14;
  animation: pulse-win 0.9s ease-in-out infinite;
}
.win-reveal-mode .hex-group.win-enclosed { opacity: 0.55; }
@keyframes pulse-win {
  0%,100% { stroke-opacity: 1;   stroke-width: 0.14; }
  50%      { stroke-opacity: 0.5; stroke-width: 0.22; }
}

/* Player-claim fills — no filter, colour stays true */
.claimed-badge {
  pointer-events: none;
}


/* ── Overlays ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 100;
  padding: 24px;
  text-align: center;
}
.overlay h2 { font-size: 22px; font-weight: 700; }
.overlay p  { font-size: 14px; color: var(--c-muted); max-width: 300px; }

.url-box {
  background: #111;
  border: 1px solid var(--c-border);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: monospace;
  font-size: 13px;
  word-break: break-all;
  color: #a0d0ff;
  max-width: 340px;
  width: 100%;
}
.btn {
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  background: #3a6abf;
  color: #fff;
  width: 100%;
  max-width: 260px;
}
.btn:active { opacity: 0.8; }
.btn.copied { background: #2a7a4a; }

/* ── Toast ── */
#toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: #333;
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 200;
  white-space: nowrap;
  max-width: 90vw;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Win overlay ── */
#win-overlay { display: none; }
#win-overlay.show { display: flex; }
#win-overlay h2 { font-size: 28px; }
.win-msg-p1 { color: var(--c-p1); }
.win-msg-p2 { color: var(--c-p2); }
.win-msg-draw { color: #aaa; }
#rematch-status { display: none; font-size: 13px; color: var(--c-muted); }

/* ── Connecting overlay ── */
#conn-overlay .spin {
  width: 36px; height: 36px;
  border: 3px solid #333;
  border-top-color: #888;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

// ── Constants (mirror worker.js) ─────────────────────────────────────────────
const HEX_DIRS = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];
const GRID_RADIUS = 3;
const COLOR_MAP = {
  red: '#d94040', orange: '#d97820', yellow: '#c8a800',
  green: '#2e9048', teal: '#1a8888', blue: '#2858a8',
};
// Icon colour per tile: light tint on dark tiles, deep shade on light tiles
const SYM_COLOR_MAP = {
  red:    '#ffb3b3',  // light rose on red
  orange: '#5c2600',  // dark brown on orange
  yellow: '#4a3800',  // dark amber on yellow
  green:  '#b3ffc8',  // light mint on green
  teal:   '#b3eeee',  // light aqua on teal
  blue:   '#b3ccff',  // light periwinkle on blue
};
const SYM_LABEL = {
  sunflower: 'Sunflower', mountains: 'Mountains', basel: 'Basel',
  cow: 'Cow', fastenwahe: 'Fastenwahe', muffin: 'Muffin',
};

// ── Hex geometry (flat-top, s=1 SVG units) ──────────────────────────────────
const hexKey = (q, r) => `${q},${r}`;
function hexCenter(q, r) {
  return { x: 1.5 * q, y: (Math.sqrt(3) / 2) * q + Math.sqrt(3) * r };
}
function hexCornerPoints(cx, cy, scale = 1) {
  return Array.from({ length: 6 }, (_, i) => {
    const a = (Math.PI / 3) * i;
    return `${cx + scale * Math.cos(a)},${cy + scale * Math.sin(a)}`;
  }).join(' ');
}

// ── Session / room ID ────────────────────────────────────────────────────────
function getOrCreatePlayerId() {
  let id = localStorage.getItem('kamon_player_id');
  if (!id) {
    id = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('kamon_player_id', id);
  }
  return id;
}

// Deployed Cloudflare Worker URL — update this after running `npm run deploy`
const WORKER_HOST = 'kamon.jeff-pires.workers.dev';

const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';

function getRoomId() {
  return location.hash.slice(1) || null;
}

function createRoomId() {
  return Math.random().toString(36).slice(2, 8) + Math.random().toString(36).slice(2, 6);
}

// ── State ────────────────────────────────────────────────────────────────────
let myPlayerNum = null;
let gameState   = null;
let ws          = null;
let roomId      = null;
let winPhase    = 'none'; // 'none' | 'reveal' | 'overlay'
let winTileKeys = new Set();
let encTileKeys = new Set();

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  roomId = getRoomId();
  if (!roomId) {
    roomId = createRoomId();
    history.replaceState(null, '', `#${roomId}`);
  }

  const url = isLocal
    ? `ws://localhost:8787/room/${roomId}/ws`
    : `wss://${WORKER_HOST}/room/${roomId}/ws`;

  showOverlay('conn-overlay');
  ws = new WebSocket(url);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', playerId: getOrCreatePlayerId() }));
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }
    if      (msg.type === 'assigned') handleAssigned(msg);
    else if (msg.type === 'state')    handleState(msg.state);
    else if (msg.type === 'error')    showToast(msg.message);
  };

  ws.onclose = () => {
    showToast('Disconnected — reconnecting…');
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

function handleAssigned({ playerNum }) {
  myPlayerNum = playerNum;
}

function handleState(state) {
  gameState = state;
  hideOverlay('conn-overlay');
  renderAll(state);
}

// ── Rendering ────────────────────────────────────────────────────────────────
function renderAll(state) {
  renderBoard(state);
  renderTopbar(state);
  renderPhase(state);
  if (winPhase === 'reveal') applyWinHighlights();
}

function renderTopbar(state) {
  const label = document.getElementById('turn-label');
  const badge = document.getElementById('constraint-badge');

  if (state.phase === 'waiting') {
    label.textContent = 'Waiting for opponent…';
    label.className   = 'their-turn';
    badge.style.display = 'none';
    return;
  }
  if (state.phase === 'ended') {
    label.textContent = 'Game over';
    label.className   = 'their-turn';
    badge.style.display = 'none';
    return;
  }

  const isYourTurn = state.currentPlayer === myPlayerNum;
  label.textContent = isYourTurn ? 'Your turn' : 'Opponent\'s turn';
  label.className   = isYourTurn ? 'your-turn' : 'their-turn';

  if (state.constraint) {
    badge.style.display = 'flex';
    const { symbol, color } = state.constraint;
    document.getElementById('cb-color').style.background = COLOR_MAP[color] || '#888';
    const cbSym = document.getElementById('cb-sym');
    cbSym.innerHTML = `<use href="#sym-${symbol}" x="0" y="0" width="100" height="100" color="white"/>`;
    document.getElementById('cb-text').textContent =
      `${SYM_LABEL[symbol] || symbol} or ${color}`;
  } else {
    badge.style.display = 'none';
  }
}


function renderPhase(state) {
  if (state.phase === 'waiting' && myPlayerNum === 1) {
    const shareUrl = location.href;
    document.getElementById('share-url').textContent = shareUrl;
    showOverlay('waiting-overlay');
  } else if (state.phase === 'waiting') {
    // Player 2 sees "Waiting for game to start" via topbar — no overlay needed
    hideOverlay('waiting-overlay');
  } else {
    hideOverlay('waiting-overlay');
  }

  if (state.phase !== 'ended' && winPhase !== 'none') {
    // New game started — tear down all end-game UI
    winPhase    = 'none';
    winTileKeys = new Set();
    encTileKeys = new Set();
    document.getElementById('win-overlay').classList.remove('show');
    document.getElementById('win-reveal').style.display = 'none';
    document.getElementById('board-wrap').classList.remove('win-reveal-mode');
    for (const g of document.getElementById('hex-layer').children) {
      g.classList.remove('win-tile', 'win-enclosed');
    }
  }

  if (state.phase === 'ended' && winPhase === 'none') {
    showWinReveal(state);
  }

  if (state.phase === 'ended' && winPhase === 'overlay') {
    updateRematchUI(state);
  }
}

// ── Board SVG rendering ──────────────────────────────────────────────────────
function renderBoard(state) {
  const layer = document.getElementById('hex-layer');
  const validSet   = new Set(state.validMoves || []);
  const claimed1   = new Set(state.claimed['1']);
  const claimed2   = new Set(state.claimed['2']);
  const isMyTurn   = state.currentPlayer === myPlayerNum && state.phase === 'playing';

  // Build all hex groups; reuse existing DOM nodes by key to reduce churn
  const existing = {};
  for (const g of layer.children) existing[g.dataset.key] = g;

  const seen = new Set();

  for (const key of Object.keys(state.hexMap)) {
    seen.add(key);
    const { symbol, color } = state.hexMap[key];
    const [q, r] = key.split(',').map(Number);
    const { x, y } = hexCenter(q, r);
    const fill     = COLOR_MAP[color] || '#666';
    const isValid  = validSet.has(key);
    const isClaimed1 = claimed1.has(key);
    const isClaimed2 = claimed2.has(key);
    const isLast   = state.lastClaimed === key;

    let g = existing[key];
    if (!g) {
      g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.dataset.key = key;
      layer.appendChild(g);
    }

    // Recompute classes
    const classes = ['hex-group'];
    if (isValid && isMyTurn)  classes.push('clickable');
    if (isClaimed1)           classes.push('claimed-1');
    if (isClaimed2)           classes.push('claimed-2');
    if (isLast)               classes.push('last-claimed');
    g.setAttribute('class', classes.join(' '));

    if (isValid && isMyTurn) {
      g.onclick = () => sendMove(q, r);
    } else {
      g.onclick = null;
    }

    // Rebuild inner SVG only if content changed (keyed by a snapshot string)
    const snap = `${symbol}:${color}:${isValid&&isMyTurn}:${isClaimed1}:${isClaimed2}:${isLast}`;
    if (g.dataset.snap === snap) continue;
    g.dataset.snap = snap;

    const HEX_SCALE   = 0.97; // slight inset so borders don't overlap
    const cornerPts   = hexCornerPoints(x, y, HEX_SCALE);
    const ringPts     = hexCornerPoints(x, y, 0.95);
    const symSize     = 1.4;
    const symOff      = symSize / 2;

    const symColor = SYM_COLOR_MAP[color] || 'white';

    let html = `<polygon class="hex-bg" points="${cornerPts}" fill="${fill}"/>`;

    // Symbol
    html += `<use class="hex-sym" href="#sym-${symbol}"
      x="${x - symOff}" y="${y - symOff}"
      width="${symSize}" height="${symSize}"
      color="${symColor}"/>`;

    // Ownership ring: white border for P1, dark border (with subtle halo) for P2
    if (isClaimed1) {
      const ownerPts = hexCornerPoints(x, y, 0.84);
      html += `<polygon points="${ownerPts}" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="0.24" pointer-events="none"/>`;
    } else if (isClaimed2) {
      const haloPts = hexCornerPoints(x, y, 0.845);
      html += `<polygon points="${haloPts}" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.06" pointer-events="none"/>`;
      const ownerPts = hexCornerPoints(x, y, 0.84);
      html += `<polygon points="${ownerPts}" fill="none" stroke="rgba(10,10,10,0.95)" stroke-width="0.24" pointer-events="none"/>`;
    }

    // Valid-move ring
    html += `<polygon class="valid-ring" points="${ringPts}"/>`;

    // Last-claimed gold ring (animated via CSS class)
    // Two concentric rings: inner in player colour, outer contrasting halo for legibility on any bg
    const haloRingPts = hexCornerPoints(x, y, 0.965);
    if (isClaimed2) {
      html += `<polygon class="claimed-ring" points="${haloRingPts}" stroke="rgba(255,255,255,0.6)"/>`;
      html += `<polygon class="claimed-ring" points="${ringPts}" stroke="#1a1a1a"/>`;
    } else {
      html += `<polygon class="claimed-ring" points="${haloRingPts}" stroke="rgba(0,0,0,0.5)"/>`;
      html += `<polygon class="claimed-ring" points="${ringPts}" stroke="white"/>`;
    }

    g.innerHTML = html;
  }

  // Remove stale groups (shouldn't happen, board is fixed)
  for (const key of Object.keys(existing)) {
    if (!seen.has(key)) existing[key].remove();
  }
}

// ── Move ─────────────────────────────────────────────────────────────────────
function sendMove(q, r) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'move', to: { q, r } }));
}

// ── Win reveal ───────────────────────────────────────────────────────────────
function applyWinHighlights() {
  for (const g of document.getElementById('hex-layer').children) {
    const key = g.dataset.key;
    if (winTileKeys.has(key)) g.classList.add('win-tile');
    if (encTileKeys.has(key)) g.classList.add('win-enclosed');
  }
}

function showWinReveal(state) {
  winPhase    = 'reveal';
  winTileKeys = new Set(state.winTiles    || []);
  encTileKeys = new Set(state.enclosedTiles || []);

  applyWinHighlights();
  document.getElementById('board-wrap').classList.add('win-reveal-mode');

  const title = document.getElementById('win-reveal-title');
  const desc  = document.getElementById('win-reveal-desc');

  if (state.winner === 'draw') {
    title.textContent = 'Draw!';
    desc.textContent  = 'The board is completely full — no winner.';
  } else {
    const isMe        = state.winner === myPlayerNum;
    const winnerLabel = state.winner === 1 ? 'White' : 'Black';
    const loserLabel  = state.winner === 1 ? 'Black' : 'White';
    title.textContent = isMe ? 'You win!' : `${winnerLabel} wins`;
    if (state.winReason === 'edge') {
      desc.textContent = `${winnerLabel}'s tiles connect two board edges — ${winTileKeys.size} tiles highlighted.`;
    } else if (state.winReason === 'enclosed') {
      const n = encTileKeys.size;
      desc.textContent = `${winnerLabel}'s tiles enclose ${n} cell${n !== 1 ? 's' : ''} — shown dimly on the board.`;
    } else {
      desc.textContent = `${loserLabel} had no valid moves.`;
    }
  }

  document.getElementById('win-reveal').style.display = 'flex';
}

function dismissWinReveal() {
  winPhase = 'overlay';
  for (const g of document.getElementById('hex-layer').children) {
    g.classList.remove('win-tile', 'win-enclosed');
  }
  document.getElementById('board-wrap').classList.remove('win-reveal-mode');
  document.getElementById('win-reveal').style.display = 'none';
  showWin(gameState);
}

// ── Win overlay ──────────────────────────────────────────────────────────────
function showWin(state) {
  const overlay = document.getElementById('win-overlay');
  const title   = document.getElementById('win-title');
  const desc    = document.getElementById('win-desc');

  if (state.winner === 'draw') {
    title.textContent = 'Draw!';
    title.className   = 'win-msg-draw';
    desc.textContent  = 'The board is completely full — it\'s a tie.';
  } else {
    const isMe = state.winner === myPlayerNum;
    const winnerLabel = state.winner === 1 ? 'White' : 'Black';
    title.textContent = isMe ? 'You win!' : `${winnerLabel} wins`;
    title.className   = state.winner === 1 ? 'win-msg-p1' : 'win-msg-p2';
    if (state.winReason === 'edge') {
      desc.textContent = isMe
        ? 'You connected two board edges!'
        : `${winnerLabel} connected two board edges.`;
    } else if (state.winReason === 'enclosed') {
      desc.textContent = isMe
        ? 'You enclosed a region of the board!'
        : `${winnerLabel} enclosed a region of the board.`;
    } else {
      desc.textContent = isMe
        ? 'Your opponent ran out of valid moves.'
        : 'You ran out of valid moves.';
    }
  }

  updateRematchUI(state);
  overlay.classList.add('show');
}

function updateRematchUI(state) {
  const btn    = document.getElementById('rematch-btn');
  const status = document.getElementById('rematch-status');
  const rematch = state.rematch || {};
  const myReq   = rematch[String(myPlayerNum)];
  const oppNum  = myPlayerNum === 1 ? 2 : 1;
  const oppReq  = rematch[String(oppNum)];

  if (myReq) {
    btn.style.display    = 'none';
    status.textContent   = 'Rematch requested…';
    status.style.display = 'block';
  } else if (oppReq) {
    btn.textContent      = "You've been challenged to a rematch! Accept?";
    btn.style.display    = '';
    status.style.display = 'none';
  } else {
    btn.textContent      = 'Rematch';
    btn.style.display    = '';
    status.style.display = 'none';
  }
}

function requestRematch() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'rematch' }));
  }
}

// ── Overlay helpers ──────────────────────────────────────────────────────────
function showOverlay(id) { document.getElementById(id).style.display = 'flex'; }
function hideOverlay(id) { document.getElementById(id).style.display = 'none'; }

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Copy link ────────────────────────────────────────────────────────────────
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy Link';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// ── Boot ─────────────────────────────────────────────────────────────────────
connect();
</script>
