<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTrace — Gaia Analytica</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #090f0b; }

canvas#terrain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; filter: brightness(0.6);}

.vignette {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse at center,
    transparent 30%, rgba(9,15,11,0.5) 65%, rgba(9,15,11,0.88) 100%);
}

.app {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  font-family: 'Raleway', sans-serif;
}

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 2rem;
  border-bottom: 1px solid rgba(100,140,75,0.2);
  background: rgba(9,15,11,0.65); backdrop-filter: blur(10px);
  flex-shrink: 0;
}

.brand { display: flex; align-items: baseline; gap: 0.9rem; }

.brand-name {
  font-family: 'Cinzel', serif; font-weight: 300;
  font-size: 1.46rem; letter-spacing: 0.3em;
  color: rgba(225,215,190,0.98); text-transform: uppercase;
}

.brand-rule { color: rgba(130,165,90,0.45); font-size: 0.9rem; }

.brand-parent {
  font-weight: 200; font-size: 0.78rem; letter-spacing: 0.38em;
  text-transform: uppercase; color: rgba(150,185,105,0.82);
  text-decoration: none; transition: color 0.3s;
}
.brand-parent:hover { color: rgba(190,218,130,0.92); }

.header-actions { display: flex; align-items: center; gap: 1.5rem; }

.session-pill {
  font-size: 0.68rem; letter-spacing: 0.14em; font-weight: 200;
  color: rgba(165,185,125,0.75);
}

.btn-ghost {
  font-family: 'Raleway', sans-serif; font-weight: 200;
  font-size: 0.99rem; letter-spacing: 0.35em; text-transform: uppercase;
  color: rgba(220,235,160,1); background: transparent;
  border: 1px solid rgba(100,140,75,0.25); padding: 0.42rem 1rem;
  cursor: pointer; transition: all 0.3s;
}
.btn-ghost:hover {
  color: rgba(225,215,190,0.95); border-color: rgba(130,165,90,0.5);
  background: rgba(58,88,52,0.22);
}

/* ── Main ── */
main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── Chat panel ── */
.chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── Map panel ── */
.map-panel {
  width: 0; flex-shrink: 0; overflow: hidden; position: relative;
  display: flex; flex-direction: column;
  border-left: 1px solid rgba(100,140,75,0.15);
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.map-panel.open { width: 42%; }

#map { flex: 1; min-height: 0; }

.basemap-toggle {
  display: none; position: absolute; top: 0.9rem; right: 0.9rem; z-index: 500;
  background: rgba(7,12,8,0.88); border: 1px solid rgba(100,140,75,0.25);
}
.map-panel.open .basemap-toggle { display: flex; }
.basemap-toggle button {
  font-family: 'Raleway', sans-serif; font-weight: 200;
  font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(195,225,140,1); background: transparent; border: none;
  padding: 0.42rem 0.75rem; cursor: pointer; transition: all 0.25s;
}
.basemap-toggle button + button { border-left: 1px solid rgba(100,140,75,0.2); }
.basemap-toggle button:hover { color: rgba(215,240,160,1); }
.basemap-toggle button.active {
  color: rgba(225,215,190,0.95); background: rgba(58,88,52,0.32);
}

.map-bar {
  padding: 0.7rem 1.2rem;
  background: rgba(7,12,8,0.88);
  border-top: 1px solid rgba(100,140,75,0.14);
  display: flex; align-items: center; gap: 1.6rem;
  min-height: 3rem; flex-shrink: 0; flex-wrap: wrap;
}

.map-coord-group { display: flex; flex-direction: column; gap: 0.12rem; }

.map-coord-label {
  font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(170,190,130,0.78); font-weight: 200;
}

.map-coord-val {
  font-size: 0.82rem; letter-spacing: 0.06em;
  color: rgba(180,210,120,0.8); font-family: 'Courier New', monospace;
  cursor: pointer; transition: color 0.2s;
}
.map-coord-val:hover { color: rgba(225,215,190,0.95); }

.map-place-name {
  flex: 1; text-align: right;
  font-family: 'Cinzel', serif; font-weight: 300;
  font-size: 0.85rem; letter-spacing: 0.2em;
  color: rgba(225,215,188,0.93);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.map-precision-badge {
  font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
  padding: 0.2rem 0.5rem; font-weight: 200;
  border: 1px solid rgba(100,140,75,0.25); color: rgba(165,195,115,0.85);
}

.copy-btn {
  font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
  font-weight: 200; color: rgba(165,195,115,0.72); cursor: pointer;
  background: none; border: none; font-family: 'Raleway', sans-serif;
  padding: 0.15rem 0.4rem; border: 1px solid rgba(100,140,75,0.18);
  transition: all 0.25s; white-space: nowrap;
}
.copy-btn:hover { color: rgba(180,210,120,0.8); border-color: rgba(130,165,90,0.4); }
.copy-btn.copied { color: rgba(120,195,80,0.8); border-color: rgba(95,155,60,0.4); }

/* ── Messages ── */
.messages {
  flex: 1; overflow-y: auto; padding: 1.75rem 2rem;
  display: flex; flex-direction: column; gap: 1.5rem;
  min-height: 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(100,140,75,0.18) transparent;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: rgba(100,140,75,0.18); }

/* Welcome */
.welcome {
  margin: auto; text-align: center;
  padding: 2.5rem 1.5rem; max-width: 54ch;
}
.welcome-glyph {
  font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 300;
  color: rgba(130,165,90,0.38); margin-bottom: 1.25rem;
  display: block; letter-spacing: 0.2em;
}
.welcome h2 {
  font-family: 'Cinzel', serif; font-weight: 300;
  font-size: 2rem; letter-spacing: 0.32em; text-transform: uppercase;
  color: rgba(222,212,185,0.92); margin-bottom: 1rem;
}
.welcome p {
  font-size: 0.94rem; font-weight: 300; letter-spacing: 0.06em;
  color: rgba(210,199,162,0.93); line-height: 1.9;
}
.welcome-rule {
  width: 40px; height: 1px; margin: 1.2rem auto;
  background: rgba(130,165,90,0.28);
}

/* Message rows */
.msg-row { display: flex; flex-direction: column; }
.msg-row.user { align-items: flex-end; }
.msg-row.assistant { align-items: flex-start; }

.bubble {
  max-width: 86%; padding: 1rem 1.25rem;
  font-size: 0.92rem; font-weight: 300; line-height: 1.8;
}

.msg-row.user .bubble {
  background: rgba(50,78,42,0.35);
  border: 1px solid rgba(100,140,75,0.25);
  border-bottom-right-radius: 1px;
  color: rgba(225,215,190,0.95);
}

.msg-row.assistant .bubble {
  background: rgba(10,18,11,0.8);
  border: 1px solid rgba(80,110,58,0.2);
  border-bottom-left-radius: 1px;
  color: rgba(220,210,182,0.95);
}

/* Variants aside */
.variants-note {
  max-width: 86%; margin-top: 0.5rem;
  padding: 0.48rem 0.85rem;
  border-left: 2px solid rgba(100,140,75,0.25);
  font-size: 0.78rem; font-weight: 200; letter-spacing: 0.05em;
  color: rgba(170,200,120,0.82); line-height: 1.6;
}

/* Meta row */
.msg-meta {
  display: flex; align-items: center; gap: 0.75rem;
  margin-top: 0.42rem; padding: 0 0.15rem;
}

.type-chip {
  font-size: 0.58rem; letter-spacing: 0.24em; text-transform: uppercase;
  font-weight: 300; padding: 0.2rem 0.58rem; line-height: 1;
}
.type-chip.answer      { color: rgba(130,205,88,0.88);  border: 1px solid rgba(100,165,65,0.35);  background: rgba(42,80,28,0.32); }
.type-chip.question    { color: rgba(210,178,80,0.88);  border: 1px solid rgba(162,130,48,0.35); background: rgba(72,60,16,0.32); }
.type-chip.null_result { color: rgba(195,128,80,0.88);  border: 1px solid rgba(148,92,50,0.35);  background: rgba(58,32,16,0.32); }

.confidence-pip {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
}
.pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.confidence-pip.high   { color: rgba(130,205,88,0.72);  } .confidence-pip.high   .pip { background: rgba(130,205,88,0.82); }
.confidence-pip.medium { color: rgba(210,178,80,0.72);  } .confidence-pip.medium .pip { background: rgba(210,178,80,0.82); }
.confidence-pip.low    { color: rgba(195,128,80,0.72);  } .confidence-pip.low    .pip { background: rgba(195,128,80,0.82); }

.turn-mark {
  font-size: 0.6rem; letter-spacing: 0.14em;
  color: rgba(160,180,125,0.62); font-weight: 200; margin-left: auto;
}

/* Sources row */
.sources-row {
  display: flex; flex-wrap: wrap; gap: 0.32rem;
  margin-top: 0.48rem; max-width: 86%;
}
.src-chip {
  font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
  font-weight: 200; color: rgba(165,195,115,0.82);
  border: 1px solid rgba(80,110,55,0.22);
  padding: 0.14rem 0.42rem;
}

/* Structured data toggle */
.data-toggle {
  display: inline-flex; align-items: center; gap: 0.4rem;
  margin-top: 0.8rem; font-family: 'Raleway', sans-serif;
  font-size: 0.66rem; letter-spacing: 0.26em; text-transform: uppercase;
  font-weight: 200; color: rgba(170,200,120,0.8); cursor: pointer;
  background: none; border: none;
}
.data-toggle:hover { color: rgba(180,210,120,0.8); }

.data-drawer { display: none; }
.data-drawer.open { display: block; }

.data-table {
  margin-top: 0.6rem; width: 100%;
  border-collapse: collapse; font-size: 0.8rem;
}
.data-table tr { border-bottom: 1px solid rgba(80,110,55,0.12); }
.data-table td { padding: 0.32rem 0.45rem; vertical-align: middle; }
.data-table td:first-child {
  color: rgba(170,200,120,0.85); font-weight: 300;
  letter-spacing: 0.06em; white-space: nowrap; width: 10rem;
  font-size: 0.76rem;
}
.data-table td:last-child {
  color: rgba(228,218,190,0.9); font-weight: 200;
}

/* Copyable values */
.copyable {
  display: inline-flex; align-items: center; gap: 0.5rem;
}
.copyable-val {
  font-family: 'Courier New', monospace; font-size: 0.76rem;
  letter-spacing: 0.04em;
}
.copy-inline {
  font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase;
  font-weight: 200; color: rgba(160,185,115,0.68); cursor: pointer;
  background: none; border: 1px solid rgba(80,110,55,0.2);
  padding: 0.1rem 0.32rem; font-family: 'Raleway', sans-serif;
  transition: all 0.25s; flex-shrink: 0;
}
.copy-inline:hover { color: rgba(180,210,120,0.75); border-color: rgba(130,165,90,0.4); }
.copy-inline.copied { color: rgba(120,195,80,0.85); }

/* Typing indicator */
.typing-row { align-items: flex-start; }
.typing-bubble {
  display: flex; gap: 0.35rem; align-items: center;
  padding: 0.85rem 1.1rem;
  background: rgba(10,18,11,0.8);
  border: 1px solid rgba(80,110,58,0.2);
}
.t-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(130,165,90,0.48);
  animation: tpulse 1.35s ease-in-out infinite;
}
.t-dot:nth-child(2) { animation-delay: 0.18s; }
.t-dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes tpulse {
  0%,80%,100% { opacity: 0.28; transform: scale(0.8); }
  40%         { opacity: 1;    transform: scale(1);   }
}

/* ── Input area ── */
.input-wrap {
  padding: 1rem 2rem 1.25rem;
  border-top: 1px solid rgba(100,140,75,0.15);
  background: rgba(9,15,11,0.75); backdrop-filter: blur(10px);
  display: flex; gap: 0.75rem; align-items: flex-end; flex-shrink: 0;
}

#inp {
  flex: 1;
  background: rgba(14,24,16,0.75);
  border: 1px solid rgba(100,140,75,0.4);
  color: rgba(255,255,255,1);
  font-family: 'Raleway', sans-serif; font-weight: 300;
  font-size: 0.9rem; letter-spacing: 0.04em;
  padding: 0.85rem 1.1rem; resize: none;
  min-height: 88px; max-height: 200px; line-height: 1.7;
  outline: none; transition: border-color 0.3s;
}
#inp::placeholder { color: rgba(150,180,105,0.83); font-size: 0.88rem; }
#inp:focus { border-color: rgba(130,165,90,0.84); }

.input-right { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }

#go {
  font-family: 'Raleway', sans-serif; font-weight: 200;
  font-size: 0.85rem; letter-spacing: 0.38em; text-transform: uppercase;
  color: rgba(200,228,140,0.95); background: rgba(38,65,26,0.42);
  border: 1px solid rgba(100,140,75,0.32);
  padding: 0 1.4rem; height: 65px; cursor: pointer; transition: all 0.3s;
  white-space: nowrap;
}
#go:hover { background: rgba(55,88,38,0.52); border-color: rgba(130,165,90,0.55); color: rgba(225,215,190,0.95); }
#go:disabled { opacity: 0.35; cursor: not-allowed; }

.hint {
  font-size: 0.78rem; letter-spacing: 0.12em; font-weight: 200;
  color: rgba(195,212,150,0.85); white-space: nowrap;
}

/* ── Leaflet overrides ── */
.leaflet-container { background: #070d08; font-family: 'Raleway', sans-serif; }
.leaflet-control-zoom a {
  background: rgba(10,18,11,0.92) !important;
  color: rgba(195,220,135,0.85) !important;
  border-color: rgba(100,140,75,0.3) !important;
}
.leaflet-control-attribution {
  background: rgba(7,12,8,0.75) !important;
  color: rgba(150,170,115,0.55) !important; font-size: 9px !important;
}
.leaflet-control-attribution a { color: rgba(165,195,115,0.65) !important; }
.leaflet-popup-content-wrapper {
  background: rgba(10,18,11,0.96) !important;
  border: 1px solid rgba(100,140,75,0.3) !important;
  border-radius: 0 !important; box-shadow: none !important;
}
.leaflet-popup-tip { background: rgba(10,18,11,0.96) !important; }
.leaflet-popup-content { margin: 10px 14px !important; }

/* ── Responsive ── */
@media (max-width: 780px) {
  main { flex-direction: column-reverse; }
  .map-panel { width: 100% !important; height: 0; transition: height 0.55s; border-left: none; border-top: 1px solid rgba(100,140,75,0.14); }
  .map-panel.open { height: 40vh; width: 100% !important; }
  .messages { padding: 1.1rem; }
  .input-wrap { padding: 0.8rem 1.1rem 1rem; }
  header { padding: 0.9rem 1.1rem; }
  .session-pill { display: none; }
  #inp { min-height: 70px; }
}
</style>
</head>
<body>

<canvas id="terrain"></canvas>
<div class="vignette"></div>

<div class="app">
  <header>
    <div class="brand">
      <span class="brand-name">GeoTrace</span>
      <span class="brand-rule">·</span>
      <a class="brand-parent" href="https://gaiaanalytica.ch" target="_blank" rel="noopener">Gaia Analytica</a>
    </div>
    <div class="header-actions">
      <span class="session-pill" id="sess-label"></span>
      <button class="btn-ghost" onclick="newSession()">New Session</button>
    </div>
  </header>

  <main>
    <div class="chat-panel">
      <div class="messages" id="msgs">
        <div class="welcome">
          <span class="welcome-glyph">⊕</span>
          <div class="welcome-rule"></div>
          <h2>Location Research</h2>
          <div class="welcome-rule"></div>
          <p>Describe any location.<br>Provide as much context as you have such as:<br>
<span style="display: block; text-align: left;margin: 6px 0; padding-left: calc(15px + 7ch); line-height: 1.6;">
    • Country<br>
    • Administrative zone<br>
    • Local name<br>
    • Local institutions or infrastructure<br>
    • Proximity to known places<br>
    • Distance and direction references
  </span></p>
        </div>
      </div>
      <div class="input-wrap">
        <textarea id="inp" placeholder="Describe the location. The more context you provide, the better the result."></textarea>
        <div class="input-right">
          <button id="go" onclick="send()">Search</button>
          <span class="hint">ctrl ↵ to send</span>
        </div>
      </div>
    </div>

    <div class="map-panel" id="map-panel">
      <div class="basemap-toggle" id="basemap-toggle">
        <button class="bt-btn active" data-mode="terrain" onclick="setBasemap('terrain')">Terrain</button>
        <button class="bt-btn" data-mode="imagery" onclick="setBasemap('imagery')">Imagery</button>
      </div>
      <div id="map"></div>
      <div class="map-bar" id="map-bar"></div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet-vector@4.2.4/dist/esri-leaflet-vector.js"></script>
<script>
// ── Topographic canvas (Randomized & Optimized) ──────────────────────────────
    const cv = document.getElementById('terrain'), cx = cv.getContext('2d');
    let W, H, T = 0, lastFrame = 0;
    function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
    addEventListener('resize', resize); resize();

    // RANDOM SEEDS: Generated once at initialization. 
    // This offsets the math so the map is completely unique on every reload.
    const seedX1 = Math.random() * 100;
    const seedX2 = Math.random() * 100;
    const seedY1 = Math.random() * 100;
    const seedY2 = Math.random() * 100;
    const seedZ1 = Math.random() * 100;

    // 3 terms — lightweight organic field with dynamic seeding
    function fld(x, y, t) {
      const s = 0.003;
      return Math.sin((x * s * 1.1) + (t * .16) + Math.cos((y * s * .9)  - (t * .05) + seedX1)) * 1.2
           + Math.sin((y * s * 1.25) - (t * .11) + Math.cos((x * s * 1.1) + (t * .07) + seedY1)) * 0.9
           + Math.sin(((x - y) * s * .8) + (t * .08) + seedZ1) * 0.6;
    }

    const CTRS=[
      [-1.8,[22,44,25,.82]],[-0.8,[38,65,42,.72]],[0.1,[58,88,52,.65]],
      [0.7,[82,108,62,.58]],[1.2,[112,132,72,.50]],[1.6,[140,150,85,.42]],
      [2.0,[165,148,95,.34]]
    ];

    function draw() {
      cx.fillStyle='#090f0b'; cx.fillRect(0,0,W,H);
      
      const r=13, cols=Math.ceil(W/r)+2, rows=Math.ceil(H/r)+2, g=[];
      for(let j=0;j<rows;j++){
        g[j]=new Float32Array(cols);
        for(let i=0;i<cols;i++) g[j][i]=fld(i*r,j*r,T);
      }
      
      cx.lineWidth = 1.2; 
      cx.lineCap = 'round';
      cx.lineJoin = 'round';

      for(const[thr,[rc,gc,bc,a]]of CTRS){
        cx.beginPath();
        cx.strokeStyle=`rgba(${rc},${gc},${bc},${a})`;
        
        for(let j=0;j<rows-1;j++) {
          for(let i=0;i<cols-1;i++){
            const x0=i*r, y0=j*r;
            const tl=g[j][i], tr=g[j][i+1], bl=g[j+1][i], br=g[j+1][i+1];
            const pts=[];
            
            if((tl-thr)*(tr-thr)<0) pts.push([x0+r*(thr-tl)/(tr-tl), y0]);
            if((tr-thr)*(br-thr)<0) pts.push([x0+r, y0+r*(thr-tr)/(br-tr)]);
            if((bl-thr)*(br-thr)<0) pts.push([x0+r*(thr-bl)/(br-bl), y0+r]);
            if((tl-thr)*(bl-thr)<0) pts.push([x0, y0+r*(thr-tl)/(bl-tl)]);
            
            if(pts.length===2){
              cx.moveTo(pts[0][0],pts[0][1]); cx.lineTo(pts[1][0],pts[1][1]);
            } else if(pts.length===4){
              cx.moveTo(pts[0][0],pts[0][1]); cx.lineTo(pts[1][0],pts[1][1]);
              cx.moveTo(pts[2][0],pts[2][1]); cx.lineTo(pts[3][0],pts[3][1]);
            }
          }
        }
        cx.stroke();
      }
    }

    // Main Loop
    function loop(ts) {
      requestAnimationFrame(loop);
      if (document.hidden) return;
      if (ts - lastFrame < 40) return; // ~25fps ceiling
      lastFrame = ts;
      
      T += 0.011; // 5x speed
      draw();
    }
    requestAnimationFrame(loop);

// ── Copy utility ──────────────────────────────────────────────────────────
async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = 'copied'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  } catch(e) {}
}

// ── GeoTrace ──────────────────────────────────────────────────────────────
const WORKER = 'https://geotrace.jeff-pires.workers.dev/query';
const ARCGIS_API_KEY = 'AAPTar4bJfAIgsPKDUAIYTbkfZQ..0Sf_U1Etp__vsdp5YF9EJ2djOriQsF_mULPraeEpIoNKMq5SsY8ND934x49fo6ami-yUXSAElNDxnZFM_n7rll7IychuU49-tXmaSbtmHcKJX-UqUBKESOFAf_-jSP-Up6gON8ZXXSYDVzpO7JDgKofz7MqEVmqsGl213TL1n-Jiu7kRwt-x4AEU8_2WzHh2ddKq9CqBM70tJ6Lwp3RmUThHpR6A1l7g_RUdOOJCfs0ktynAAUVcCcYrAeidPg..AT1_eq1vEjEh';
let leafMap = null, markers = [];

function sid() {
  let id = sessionStorage.getItem('gt-sid');
  if (!id) { id = crypto.randomUUID(); sessionStorage.setItem('gt-sid', id); }
  return id;
}
function refreshLabel() {
  document.getElementById('sess-label').textContent = 'session ' + sid().slice(0,8);
}
function newSession() {
  sessionStorage.removeItem('gt-sid');
  document.getElementById('msgs').innerHTML = `
    <div class="welcome">
      <span class="welcome-glyph">⊕</span>
      <div class="welcome-rule"></div>
      <h2>Location Research</h2>
      <div class="welcome-rule"></div>
      <p>Describe any location — provide as much context as you have. Country, administrative zone, local name, proximity to known places, distance and direction references.</p>
    </div>`;
  document.getElementById('inp').value = '';
  closeMap(); refreshLabel();
}
function closeMap() {
  document.getElementById('map-panel').classList.remove('open');
  document.getElementById('map-bar').innerHTML = '';
}

let terrainLayer = null, imageryLayer = null, labelsLayer = null, currentBasemap = 'terrain';

function initLeaflet() {
  if (leafMap) return;
  leafMap = L.map('map', { zoomControl: true });
  terrainLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd', maxZoom: 19
  });
  imageryLayer = L.esri.Vector.vectorBasemapLayer('ArcGIS:Imagery:Standard', { apikey: ARCGIS_API_KEY });
  labelsLayer = L.esri.Vector.vectorBasemapLayer('ArcGIS:Imagery:Labels', { apikey: ARCGIS_API_KEY });
  terrainLayer.addTo(leafMap);
}

function setBasemap(mode) {
  if (!leafMap || mode === currentBasemap) return;
  if (mode === 'imagery') {
    leafMap.removeLayer(terrainLayer);
    imageryLayer.addTo(leafMap); labelsLayer.addTo(leafMap);
  } else {
    leafMap.removeLayer(imageryLayer); leafMap.removeLayer(labelsLayer);
    terrainLayer.addTo(leafMap);
  }
  currentBasemap = mode;
  document.querySelectorAll('#basemap-toggle .bt-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}

const PIN_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 34" width="22" height="34">
  <path d="M11 0C4.9 0 0 4.9 0 11c0 8.25 11 23 11 23S22 19.25 22 11C22 4.9 17.1 0 11 0z"
    fill="rgba(120,165,82,0.9)" stroke="rgba(180,210,120,0.6)" stroke-width="1"/>
  <circle cx="11" cy="11" r="3.5" fill="rgba(7,12,8,0.85)"/>
</svg>`;
const PIN_ICON = () => L.divIcon({ html: PIN_SVG, iconSize:[22,34], iconAnchor:[11,34], popupAnchor:[0,-36], className:'' });

function placeMap(data) {
  if (!data?.coordinates?.lat) return;
  const { lat, lng } = data.coordinates;
  const precision = data.coordinate_precision || '';
  const name = data.name || '';
  const latStr = lat.toFixed(5), lngStr = lng.toFixed(5);
  const coordStr = `${latStr}, ${lngStr}`;

  document.getElementById('map-panel').classList.add('open');
  setTimeout(() => {
    initLeaflet(); leafMap.invalidateSize();
    markers.forEach(m => leafMap.removeLayer(m)); markers = [];
    const m = L.marker([lat, lng], { icon: PIN_ICON() }).addTo(leafMap);
    markers.push(m);
    m.bindPopup(`
      <div style="font-family:'Raleway',sans-serif">
        <div style="font-family:'Cinzel',serif;font-size:13px;letter-spacing:.18em;color:rgba(180,210,120,.92);margin-bottom:6px">${name}</div>
        <div style="font-size:11px;color:rgba(130,165,90,.75);letter-spacing:.07em;font-family:'Courier New',monospace">${latStr}, ${lngStr}</div>
        ${precision ? `<div style="margin-top:4px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(150,140,110,.55)">${precision}</div>` : ''}
      </div>`);
    const zoom = precision==='exact'?12 : precision==='approximate'?9 : 7;
    leafMap.setView([lat, lng], zoom, { animate: true, duration: 1 });

    document.getElementById('map-bar').innerHTML = `
      <div class="map-coord-group">
        <div class="map-coord-label">Lat</div>
        <div class="map-coord-val" title="Click to copy" onclick="copyText('${latStr}', this)">${latStr}</div>
      </div>
      <div class="map-coord-group">
        <div class="map-coord-label">Lng</div>
        <div class="map-coord-val" title="Click to copy" onclick="copyText('${lngStr}', this)">${lngStr}</div>
      </div>
      ${precision ? `<span class="map-precision-badge">${precision}</span>` : ''}
      <button class="copy-btn" onclick="copyText('${coordStr}', this)">copy coords</button>
      <div class="map-place-name">${name}</div>`;
  }, 320);
}

// ── Rendering ─────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function adminStr(h) {
  if (!h) return null;
  return Object.values(h).filter(Boolean).join(' › ');
}

function copyableVal(val, label) {
  const safeVal = esc(val);
  const rawVal = String(val).replace(/'/g, "\\'");
  return `<span class="copyable">
    <span class="copyable-val">${safeVal}</span>
    <button class="copy-inline" onclick="copyText('${rawVal}', this)" title="Copy ${label}">copy</button>
  </span>`;
}

function dataDrawer(data) {
  if (!data) return '';
  const admin = adminStr(data.admin_hierarchy);
  const coords = data.coordinates ? `${data.coordinates.lat?.toFixed(5)}, ${data.coordinates.lng?.toFixed(5)}` : null;
  const rows = [
    ['Name', data.name, false],
    ['Coordinates', coords, true],
    ['Admin hierarchy', admin, true],
    ['Precision', data.coordinate_precision, false],
    ['Confidence', data.confidence, false],
    ['Sources', Array.isArray(data.sources) ? data.sources.join(', ') : data.sources, false],
    ['Name variants', Array.isArray(data.name_variants) && data.name_variants.length ? data.name_variants.join(', ') : null, false],
  ].filter(([,v])=>v);
  if (!rows.length) return '';
  const uid = 'dr' + Math.random().toString(36).slice(2);
  const trs = rows.map(([k,v,copyable]) => `<tr>
    <td>${esc(k)}</td>
    <td>${copyable ? copyableVal(v, k) : `<span style="font-family:'Courier New',monospace">${esc(v)}</span>`}</td>
  </tr>`).join('');
  return `<button class="data-toggle" onclick="toggleDr('${uid}')"><span id="arr-${uid}">▸</span> Structured data</button>
    <div class="data-drawer" id="${uid}"><table class="data-table">${trs}</table></div>`;
}

function toggleDr(id) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById('arr-'+id).textContent = document.getElementById(id).classList.contains('open') ? '▾' : '▸';
}

function pushMsg(role, payload) {
  document.querySelector('.welcome')?.remove();
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  if (role === 'user') {
    row.innerHTML = `<div class="bubble">${esc(payload)}</div>`;
  } else {
    const { type, narrative, data, sources_queried=[], turn, variants_tried } = payload;
    const label = { answer:'Answer', question:'Clarification needed', null_result:'Not located' }[type] || type;
    const conf = data?.confidence;
    const confHtml = conf ? `<span class="confidence-pip ${conf}"><span class="pip"></span>${conf}</span>` : '';
    const varHtml = variants_tried?.length
      ? `<div class="variants-note">Alternate spellings tried: ${variants_tried.map(esc).join(', ')}</div>` : '';
    const srcHtml = sources_queried.length
      ? `<div class="sources-row">${sources_queried.map(s=>`<span class="src-chip">${esc(s)}</span>`).join('')}</div>` : '';

    row.innerHTML = `
      <div class="bubble">
        ${esc(narrative)}
        ${type==='answer' ? dataDrawer(data) : ''}
      </div>
      ${varHtml}
      <div class="msg-meta">
        <span class="type-chip ${type}">${label}</span>
        ${confHtml}
        ${turn ? `<span class="turn-mark">↻ ${turn}</span>` : ''}
      </div>
      ${srcHtml}`;
  }
  msgs.appendChild(row);
  row.scrollIntoView({ behavior:'smooth', block:'end' });
}

function pushTyping() {
  const msgs = document.getElementById('msgs');
  const el = document.createElement('div');
  el.className = 'msg-row assistant typing-row'; el.id = 'typing';
  el.innerHTML = `<div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  msgs.appendChild(el);
  el.scrollIntoView({ behavior:'smooth', block:'end' });
}
function clearTyping() { document.getElementById('typing')?.remove(); }

// ── Send ──────────────────────────────────────────────────────────────────
async function send() {
  const inp = document.getElementById('inp');
  const msg = inp.value.trim();
  if (!msg) return;
  const btn = document.getElementById('go');
  btn.disabled = true; inp.value = ''; inp.style.height = 'auto';
  pushMsg('user', msg); pushTyping(); refreshLabel();

  try {
    const res = await fetch(WORKER, {
      method:'POST',
      headers:{'Content-Type':'application/json','X-Session-ID':sid()},
      body: JSON.stringify({message:msg})
    });
    const json = await res.json();
    clearTyping(); pushMsg('assistant', json);
    if (json.type==='answer') placeMap(json.data);
  } catch(e) {
    clearTyping();
    pushMsg('assistant', { type:'null_result', narrative:'Request failed — check your connection and try again.', sources_queried:[], turn:null, variants_tried:null });
  } finally { btn.disabled = false; inp.focus(); }
}

// ── Input ─────────────────────────────────────────────────────────────────
const inp = document.getElementById('inp');
inp.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});
inp.addEventListener('keydown', e => { if (e.key==='Enter' && (e.ctrlKey||e.metaKey)) send(); });

refreshLabel();
</script>
